media:
  input: public
  output: /

content:
  - name: pages
    label: Pages
    type: collection
    path: "src/pages"
    fields:
    - { name: layout, type: string, hidden: true }
    - { name: title, label: Title, type: string }
    - { name: body, label: Body, type: code, options: { language: markdown } }

settings:
  commit:
    identity: user